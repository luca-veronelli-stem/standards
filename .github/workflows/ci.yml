name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  static-checks:
    name: Static checks
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: PSScriptAnalyzer
        shell: pwsh
        run: |
          Install-Module PSScriptAnalyzer -Force -Scope CurrentUser -ErrorAction Stop
          $files = Get-ChildItem -Recurse -Include *.ps1 -File `
            | Where-Object { $_.FullName -notmatch '\\\.git\\' }
          if (-not $files) { Write-Host 'No .ps1 files found.'; exit 0 }
          $findings = $files | ForEach-Object {
            Invoke-ScriptAnalyzer -Path $_.FullName -Settings ./PSScriptAnalyzerSettings.psd1
          }
          if ($findings) {
            $findings | Format-Table -AutoSize | Out-String | Write-Host
            Write-Error "PSScriptAnalyzer found $(@($findings).Count) issue(s)."
            exit 1
          }
          Write-Host 'PSScriptAnalyzer: clean.'

      - name: JSON validity
        shell: pwsh
        run: |
          $jsonFiles = @(
            'claude/settings.json',
            'shared/mcp/servers.json'
          )
          $failed = $false
          foreach ($f in $jsonFiles) {
            if (-not (Test-Path $f)) {
              Write-Warning "missing: $f"
              continue
            }
            try {
              Get-Content $f -Raw | ConvertFrom-Json -ErrorAction Stop | Out-Null
              Write-Host "ok: $f"
            } catch {
              Write-Host "::error file=$f::Invalid JSON: $($_.Exception.Message)"
              $failed = $true
            }
          }
          if ($failed) { exit 1 }

      - name: Skill frontmatter
        shell: pwsh
        run: |
          $skills = Get-ChildItem -Path 'shared/skills' -Directory -ErrorAction SilentlyContinue
          if (-not $skills) { Write-Host 'No skills found.'; exit 0 }
          $failed = $false
          foreach ($s in $skills) {
            $skillFile = Join-Path $s.FullName 'SKILL.md'
            if (-not (Test-Path $skillFile)) {
              Write-Host "::error file=$($s.FullName)::missing SKILL.md"
              $failed = $true; continue
            }
            $content = Get-Content $skillFile -Raw
            if ($content -notmatch '(?s)\A---\s*\r?\n.*?\bname\s*:.*?\bdescription\s*:.*?\r?\n---') {
              Write-Host "::error file=$skillFile::missing or malformed YAML frontmatter (need name + description)"
              $failed = $true
            } else {
              Write-Host "ok: $skillFile"
            }
          }
          if ($failed) { exit 1 }
