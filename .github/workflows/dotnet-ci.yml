# Reusable workflow shipped from luca-veronelli-stem/standards. Adopted repos
# call this via `uses: luca-veronelli-stem/standards/.github/workflows/dotnet-ci.yml@<version>`
# from a thin stub in their own .github/workflows/ci.yml. Bumping a pin here
# (e.g. setup-dotnet, dorny/test-reporter) propagates to adopted repos on
# their next CI run, with no per-repo PR.
#
# Source of truth for invariants: shared/standards/CI.md.

name: dotnet-ci (reusable)

on:
  workflow_call:

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  build:
    name: build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/Directory.Packages.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      # Lean steps are gated on runner.os == 'Linux' (the build leg that runs
      # `lake build`) and on the recursive `**/lean-toolchain` pattern so both
      # layouts work: workspace-root (`./lean-toolchain`) and the
      # sub-directory layout STEM apps use (`lean/lean-toolchain` — keeps Lean
      # artefacts grouped, leaves the repo root for .NET / docs / standards).
      # See #84. The Lean toolchain is identical across OSes, so we don't
      # double the cache + build on the Windows leg for no signal.
      - name: Cache Lean toolchain
        if: runner.os == 'Linux' && hashFiles('**/lean-toolchain') != ''
        uses: actions/cache@v5
        with:
          path: ~/.elan
          key: ${{ runner.os }}-elan-${{ hashFiles('**/lean-toolchain') }}

      - name: Setup elan
        if: runner.os == 'Linux' && hashFiles('**/lean-toolchain') != ''
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -x "$HOME/.elan/bin/elan" ]; then
            curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
              | sh -s -- -y --default-toolchain none
          fi
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Restore
        run: dotnet restore

      # Whitespace-only because the analyzer phase of `dotnet format` fails with
      # CS0246 on cross-language refs (C# -> F#) on GitHub-hosted runners, even
      # after a successful build. Analyzer/style rules are still enforced via the
      # build's TreatWarningsAsErrors. See docs/Standards/CI.md ->
      # "Format check is a hard gate (whitespace-only in CI)".
      - name: Verify formatting (whitespace)
        run: dotnet format whitespace --verify-no-changes --no-restore

      # The Linux leg drops `--framework net10.0` from build (#22) and runs
      # tests project-by-project (#82): that flag overrides per-project TFMs.
      # The build step compiles every project (legacy net10.0-windows ones
      # build on Linux via EnableWindowsTargeting=true). The test step then
      # enumerates `tests/**/*.Tests.{fsproj,csproj}` and skips projects whose
      # name matches `*.Tests.Windows.*` or `*.Tests.Linux.*` -- the naming
      # convention codified in shared/standards/TESTING.md. vstest cannot
      # filter Windows-only-TFM test assemblies via `--framework net10.0` at
      # solution scope (it tries to load a net10.0 output that does not exist),
      # so exclusion happens at the project level.
      - name: Build (cross-platform leg)
        if: runner.os == 'Linux'
        run: dotnet build --configuration Release --no-restore

      - name: Build (full leg, includes net10.0-windows)
        if: runner.os == 'Windows'
        run: dotnet build --configuration Release --no-restore

      - name: Test (cross-platform leg)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          shopt -s globstar nullglob
          for proj in tests/**/*.Tests.fsproj tests/**/*.Tests.csproj; do
            case "$proj" in
              *.Tests.Windows.*|*.Tests.Linux.*) continue ;;
            esac
            dotnet test "$proj" --framework net10.0 --configuration Release --no-build --logger "trx;LogFileName=test-results.trx"
          done

      - name: Test (full leg)
        if: runner.os == 'Windows'
        run: dotnet test --configuration Release --no-build --logger "trx;LogFileName=test-results.trx"

      - name: Test report
        uses: dorny/test-reporter@v3
        if: always()
        with:
          name: Tests (${{ matrix.os }})
          path: '**/test-results.trx'
          reporter: dotnet-trx
          # v3 default writes results to $GITHUB_STEP_SUMMARY instead of a Check
          # Run, which silently drops the per-OS Tests check at PR level. Opt
          # back into the Check Run sink so the gate stays visible on PRs.
          use-actions-summary: 'false'

      # Constitution Principle I gate for adopter repos with a Lean track:
      # `lake build` must succeed with no `sorry` and no custom axioms. The
      # working-directory ternary handles both supported layouts -- root
      # (`./lean-toolchain`) vs. sub-directory (`lean/lean-toolchain`). See
      # #84 for the recurse-pattern context.
      - name: Lake build
        if: runner.os == 'Linux' && hashFiles('**/lean-toolchain') != ''
        shell: bash
        working-directory: ${{ hashFiles('lean-toolchain') != '' && '.' || 'lean' }}
        run: lake build
