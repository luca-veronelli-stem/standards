# Reusable release workflow for archetype A (desktop GUI). Adopted repos
# call this from a thin stub on `v*.*.*` tag push, supplying their app and
# repo names. Produces a self-contained win-x64 zip + GitHub Release.
# Source of truth: shared/standards/CI.md -> "Release workflow -- archetype A".

name: release-archetype-a (reusable)

on:
  workflow_call:
    inputs:
      app:
        description: 'PascalCase app name (matches src/<app>.GUI/)'
        required: true
        type: string
      repo:
        description: 'Repo slug used for the zip filename, e.g. stem-device-manager'
        required: true
        type: string
      tag:
        description: 'Override tag for workflow_dispatch (e.g. v1.0.0). Empty on tag-push runs.'
        required: false
        type: string
        default: ''

permissions:
  contents: write

jobs:
  release:
    name: Release ${{ github.ref_name }}
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Determine version
        id: version
        shell: pwsh
        run: |
          $tag = if ($env:GITHUB_REF_NAME -match '^v\d') {
            $env:GITHUB_REF_NAME
          } else {
            '${{ inputs.tag }}'
          }
          $version = $tag.TrimStart('v')
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Restore
        run: dotnet restore

      - name: Publish (win-x64, self-contained)
        env:
          APP: ${{ inputs.app }}
        run: |
          dotnet publish "src/${env:APP}.GUI" `
            -c Release `
            -r win-x64 `
            --self-contained `
            -p:PublishSingleFile=true `
            -p:Version=${{ steps.version.outputs.version }} `
            -o publish/win-x64

      - name: Package
        id: package
        shell: pwsh
        env:
          REPO: ${{ inputs.repo }}
        run: |
          $zip = "${env:REPO}-${{ steps.version.outputs.tag }}-win-x64.zip"
          Compress-Archive -Path publish/win-x64/* -DestinationPath $zip
          "zip=$zip" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Extract changelog entry
        id: changelog
        shell: pwsh
        run: |
          $version = '${{ steps.version.outputs.version }}'
          $content = Get-Content CHANGELOG.md -Raw
          $pattern = "(?ms)^## \[$([regex]::Escape($version))\][^\r\n]*\r?\n(.*?)(?=^## \[|\z)"
          $match = [regex]::Match($content, $pattern)
          if ($match.Success) {
              $body = $match.Groups[1].Value.Trim()
              $body | Out-File -FilePath release-notes.md -Encoding utf8
          } else {
              "Release $version" | Out-File -FilePath release-notes.md -Encoding utf8
          }

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          body_path: release-notes.md
          files: |
            ${{ steps.package.outputs.zip }}
