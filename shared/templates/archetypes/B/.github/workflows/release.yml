name: Release

# Caller stub for archetype B (library / NuGet). Job body lives upstream.
# See shared/standards/CI.md -> "Release workflow -- archetype B".

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.0.0)'
        required: true

permissions:
  contents: write
  packages: write

jobs:
  release:
    uses: luca-veronelli-stem/standards/.github/workflows/release-archetype-b.yml@{{StandardVersion}}
    with:
      owner: {{Owner}}
      tag: ${{ inputs.tag }}
